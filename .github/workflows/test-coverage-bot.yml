name: Test Coverage Bot

# Triggered by `repository_dispatch` events sent from matrixone's bridge
# workflow when a maintainer types a slash command in a PR comment.
#
# event_type: primary is `auto-test-pr`. `analyze-pr` / `gen-chaos-pr` are
#   kept for local debugging of individual pipeline steps; the matrixone
#   bridge no longer forwards them.
# client_payload:
#   pr_number:  source PR number in matrixone
#   repo:       source repo (e.g. matrixorigin/matrixone)
#   comment_id: id of the originating comment (for reactions)

on:
  repository_dispatch:
    types: [auto-test-pr, analyze-pr, gen-chaos-pr]
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Command (auto-test-pr | analyze-pr [legacy, debug-only] | gen-chaos-pr [legacy, debug-only])'
        required: true
        default: auto-test-pr
      pr_number:
        description: 'matrixone PR number'
        required: true
      repo:
        description: 'Source repo'
        required: false
        default: matrixorigin/matrixone

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve and validate dispatch inputs
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_EVENT_TYPE: ${{ github.event.action }}
          DISPATCH_PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          DISPATCH_REPO: ${{ github.event.client_payload.repo }}
          DISPATCH_COMMENT_ID: ${{ github.event.client_payload.comment_id }}
          INPUT_EVENT_TYPE: ${{ inputs.event_type }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_REPO: ${{ inputs.repo }}
          SOURCE_REPO_ALLOWLIST: ${{ vars.SOURCE_REPO_ALLOWLIST || 'matrixorigin/matrixone' }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          if os.environ["EVENT_NAME"] == "repository_dispatch":
              values = {
                  "event_type": os.environ.get("DISPATCH_EVENT_TYPE", ""),
                  "pr_number": os.environ.get("DISPATCH_PR_NUMBER", ""),
                  "repo": os.environ.get("DISPATCH_REPO", ""),
                  "comment_id": os.environ.get("DISPATCH_COMMENT_ID", ""),
              }
          else:
              values = {
                  "event_type": os.environ.get("INPUT_EVENT_TYPE", ""),
                  "pr_number": os.environ.get("INPUT_PR_NUMBER", ""),
                  "repo": os.environ.get("INPUT_REPO", ""),
                  "comment_id": "",
              }

          allowed_events = {"auto-test-pr", "analyze-pr", "gen-chaos-pr"}
          allowed_repos = {
              item.strip()
              for item in os.environ.get("SOURCE_REPO_ALLOWLIST", "").split(",")
              if item.strip()
          }

          if values["event_type"] not in allowed_events:
              sys.exit(f"invalid event_type: {values['event_type']!r}")
          if not re.fullmatch(r"[1-9][0-9]{0,9}", values["pr_number"]):
              sys.exit(f"invalid pr_number: {values['pr_number']!r}")
          if not re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", values["repo"]):
              sys.exit(f"invalid repo: {values['repo']!r}")
          if allowed_repos and values["repo"] not in allowed_repos:
              sys.exit(f"repo is not allowlisted: {values['repo']!r}")
          if values["comment_id"] and not re.fullmatch(r"[1-9][0-9]{0,19}", values["comment_id"]):
              sys.exit(f"invalid comment_id: {values['comment_id']!r}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              for key, value in values.items():
                  print(f"{key}={value}", file=out)
          PY

      - name: Checkout bot repo
        uses: actions/checkout@v4

      - name: Checkout matrixone skill docs (sparse)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.ctx.outputs.repo }}
          ref: main
          path: matrixone-skills
          sparse-checkout: |
            docs/ai-skills
          sparse-checkout-cone-mode: false

      - name: Wire skill docs into expected path
        run: |
          mkdir -p docs
          ln -sf "$GITHUB_WORKSPACE/matrixone-skills/docs/ai-skills" docs/ai-skills
          ls docs/ai-skills | head

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install --quiet requests

      - name: Acknowledge command (eyes reaction)
        if: steps.ctx.outputs.comment_id != ''
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          gh api repos/${{ steps.ctx.outputs.repo }}/issues/comments/${{ steps.ctx.outputs.comment_id }}/reactions \
            -f content="eyes" --silent || true

      - name: Route to handler
        id: route
        run: |
          case "${{ steps.ctx.outputs.event_type }}" in
            analyze-pr)    echo "script=analyze_pr.py"   >> "$GITHUB_OUTPUT" ;;
            gen-chaos-pr)  echo "script=gen_chaos_pr.py" >> "$GITHUB_OUTPUT" ;;
            auto-test-pr)  echo "script=auto_test_pr.py" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown event_type: ${{ steps.ctx.outputs.event_type }}" >&2; exit 1 ;;
          esac

      - name: Run handler
        working-directory: scripts
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          SOURCE_REPO: ${{ steps.ctx.outputs.repo }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          BOT_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          BVT_CROSS_TOKEN: ${{ secrets.BVT_CROSS_TOKEN }}
          # BVT PRs land on the bot owner's matrixone fork by default.
          BVT_TARGET_REPO: ${{ vars.BVT_TARGET_REPO || 'Ariznawlll/matrixone' }}
          BVT_TARGET_BASE: ${{ vars.BVT_TARGET_BASE || 'main' }}
          BVT_HEAD_REPO: ${{ vars.BVT_HEAD_REPO || 'Ariznawlll/matrixone' }}
          CHAOS_TARGET_REPO: ${{ vars.CHAOS_TARGET_REPO || 'Ariznawlll/mo-nightly-regression' }}
          STABILITY_TARGET_REPO: ${{ vars.STABILITY_TARGET_REPO || 'Ariznawlll/mo-nightly-regression' }}
          NIGHTLY_TARGET_REPO: ${{ vars.NIGHTLY_TARGET_REPO || 'Ariznawlll/mo-nightly-regression' }}
          BIGDATA_TARGET_BASE: ${{ vars.BIGDATA_TARGET_BASE || 'big_data' }}
          LLM_API_TOKEN: ${{ secrets.LLM_API_TOKEN }}
          LLM_API_BASE: ${{ vars.LLM_API_BASE || 'https://models.github.ai/inference' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'openai/gpt-4.1' }}
        run: |
          ln -sf ../docs ./docs
          python "${{ steps.route.outputs.script }}"

      - name: Success reaction
        if: success() && steps.ctx.outputs.comment_id != ''
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          gh api repos/${{ steps.ctx.outputs.repo }}/issues/comments/${{ steps.ctx.outputs.comment_id }}/reactions \
            -f content="rocket" --silent || true

      - name: Failure reaction & note
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          if [ -n "${{ steps.ctx.outputs.comment_id }}" ]; then
            gh api repos/${{ steps.ctx.outputs.repo }}/issues/comments/${{ steps.ctx.outputs.comment_id }}/reactions \
              -f content="confused" --silent || true
          fi
          gh pr comment "${{ steps.ctx.outputs.pr_number }}" \
            --repo "${{ steps.ctx.outputs.repo }}" \
            --body "❌ Test Coverage Bot 执行失败，详见 [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})." || true
